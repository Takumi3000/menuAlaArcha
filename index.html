<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой PDF Сайт</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Убираем лишние полосы прокрутки */
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <iframe src="document.pdf#toolbar=0" type="application/pdf">
        <p>Ваш браузер не поддерживает просмотр PDF. 
        <a href="pages.pdf">Скачайте файл</a>, чтобы просмотреть его.</p>
    </iframe>

</body>
</html>
